# Backend services only - use with docker-compose.db-only.yml (DB already running).
# Connects to postgres via external network infrastructure_dou-network.
# Usage (from infrastructure): docker compose -f docker-compose.backend-only.yml up -d --build

services:
  auth:
    build:
      context: ../backend
      dockerfile: Dockerfile.slim
    image: dou-auth:local
    container_name: dou-auth
    command: ["uvicorn", "services.auth.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      DATABASE_URL: postgresql://dou_user:dou_password123@postgres:5432/dou_expense_audit
      JWT_SECRET: 9f3b6c7e8a1d2f4c6b8e0a3d5f7c9e1b2d4a6c8e0f3b5d7a9c1e2f4a6b8c0d2
    ports:
      - "8001:8000"
    networks:
      - dou-network

  file-service:
    build:
      context: ../backend
      dockerfile: Dockerfile.slim
    image: dou-file-service:local
    container_name: dou-file-service
    command: ["uvicorn", "services.file_service.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      DATABASE_URL: postgresql://dou_user:dou_password123@postgres:5432/dou_expense_audit
      JWT_SECRET: 9f3b6c7e8a1d2f4c6b8e0a3d5f7c9e1b2d4a6c8e0f3b5d7a9c1e2f4a6b8c0d2
      STORAGE_PROVIDER: local
      LOCAL_STORAGE_PATH: /tmp/dou-receipts
      ENCRYPTION_ENABLED: "false"
      MESSAGE_QUEUE_PROVIDER: ""
      LLM_PROVIDER: gemini
      GEMINI_API_KEY: ""
      GEMINI_MODEL: models/gemini-2.0-flash
    ports:
      - "8005:8000"
    volumes:
      - file_storage:/tmp/dou-receipts
    networks:
      - dou-network

  expense:
    build:
      context: ../backend
      dockerfile: Dockerfile.slim
    image: dou-expense:local
    container_name: dou-expense
    command: ["uvicorn", "services.expense.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      DATABASE_URL: postgresql://dou_user:dou_password123@postgres:5432/dou_expense_audit
      JWT_SECRET: 9f3b6c7e8a1d2f4c6b8e0a3d5f7c9e1b2d4a6c8e0f3b5d7a9c1e2f4a6b8c0d2
    ports:
      - "8002:8000"
    networks:
      - dou-network

  report-service:
    build:
      context: ../backend
      dockerfile: Dockerfile.slim
    image: dou-report-service:local
    container_name: dou-report-service
    command: ["uvicorn", "services.report_service.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      DATABASE_URL: postgresql://dou_user:dou_password123@postgres:5432/dou_expense_audit
      JWT_SECRET: 9f3b6c7e8a1d2f4c6b8e0a3d5f7c9e1b2d4a6c8e0f3b5d7a9c1e2f4a6b8c0d2
    ports:
      - "8009:8000"
    networks:
      - dou-network

  admin:
    build:
      context: ../backend
      dockerfile: Dockerfile.slim
    image: dou-admin:local
    container_name: dou-admin
    command: ["uvicorn", "services.admin.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      DATABASE_URL: postgresql://dou_user:dou_password123@postgres:5432/dou_expense_audit
      JWT_SECRET: 9f3b6c7e8a1d2f4c6b8e0a3d5f7c9e1b2d4a6c8e0f3b5d7a9c1e2f4a6b8c0d2
    ports:
      - "8003:8000"
    networks:
      - dou-network

  audit:
    build:
      context: ../backend
      dockerfile: Dockerfile.slim
    image: dou-audit:local
    container_name: dou-audit
    command: ["uvicorn", "services.audit.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      DATABASE_URL: postgresql://dou_user:dou_password123@postgres:5432/dou_expense_audit
      JWT_SECRET: 9f3b6c7e8a1d2f4c6b8e0a3d5f7c9e1b2d4a6c8e0f3b5d7a9c1e2f4a6b8c0d2
    ports:
      - "8004:8000"
    networks:
      - dou-network

volumes:
  file_storage:

networks:
  dou-network:
    external: true
